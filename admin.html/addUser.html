<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nyondo - Add New User Form</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <link rel="stylesheet" href="../admin.css/addUser.css">
</head>
<body>

    <section class="form-container">
        <div class="form-header">
            <h3>Add New User</h3>
            <p>Create a brand new user and add them to this site.</p>
        </div>

        <form class="nyondo-user-form">
            <!-- Username -->
            <div class="form-row">
                <label>Username <em>(required)</em></label>
                <div class="input-wrapper">
                    <input type="text" required>
                </div>
            </div>

            <!-- Email -->
            <div class="form-row">
                <label>Email <em>(required)</em></label>
                <div class="input-wrapper">
                    <input type="email" required>
                </div>
            </div>

            <!-- First Name -->
            <div class="form-row">
                <label>First Name</label>
                <div class="input-wrapper">
                    <input type="text" required>
                </div>
            </div>

            <!-- Last Name -->
            <div class="form-row">
                <label>Last Name</label>
                <div class="input-wrapper">
                    <input type="text" required>
                </div>
            </div>

            <!-- Website -->
            <div class="form-row">
                <label>Website</label>
                <div class="input-wrapper">
                    <input type="url">
                </div>
            </div>

            <!-- Password -->
            <div class="form-row">
                <label>Password</label>
                <div class="input-wrapper">
                    <button type="button" class="btn-outline">Show password</button>
                </div>
            </div>

            <!-- Notification -->
            <div class="form-row checkbox-row">
                <label>Send User Notification</label>
                <div class="input-wrapper">
                    <div class="checkbox-group">
                        <input type="checkbox" id="notify" checked>
                        <label for="notify" class="inline-label">Send the new user an email about their account.</label>
                    </div>
                </div>
            </div>

            <!-- Role -->
            <div class="form-row">
                <label>Role</label>
                <div class="input-wrapper">
                    <select>
                        <option disabled>Select Role</option>
                        <option>Sales Attendant</option>
                        <option>Store Manager</option>
                        <!-- <option>Administrator</option> -->
                    </select>
                </div>
            </div>

            <!-- Submit Action -->
            <div class="form-footer">
                <button type="submit" class="btn-submit">Add New User</button>
            </div>
        </form>
    </section>

</body>
</html>
